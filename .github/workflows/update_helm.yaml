name: Update Datadog (Helm)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to update"
        required: true
        type: choice
        options:
          - staging
          - production
      confirm:
        description: "Type the environment name to confirm"
        required: true

jobs:
  update-helm:
    name: Update Datadog (${{ inputs.environment }}) (Helm)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EKS_CLUSTER_NAME: togglemaster-${{ inputs.environment }}-cluster
      DATADOG_NAMESPACE: datadog
      CHART_PATH: helm/datadog

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "${{ inputs.environment }}" ]; then
            echo "::error::Confirmation does not match environment. Got '${{ inputs.confirm }}', expected '${{ inputs.environment }}'."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: Togglemaster/Observability

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$EKS_CLUSTER_NAME"

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Add Datadog Helm repo
        run: |
          helm repo add datadog https://helm.datadoghq.com
          helm repo update

      - name: Build chart dependencies
        run: helm dependency build "$CHART_PATH"

      - name: Apply changes
        env:
          DD_API_KEY: ${{ secrets.API_KEY }}
          DD_APP_KEY: ${{ secrets.APP_KEY }}
          DD_CLUSTER_AGENT_TOKEN: ${{ secrets.CLUSTER_AGENT_TOKEN }}
        run: |
          helm upgrade datadog-operator "$CHART_PATH" \
            --namespace "$DATADOG_NAMESPACE" \
            --reuse-values \
            --set credentials.apiKey="$DD_API_KEY" \
            --set credentials.appKey="$DD_APP_KEY" \
            --set credentials.clusterAgentToken="$DD_CLUSTER_AGENT_TOKEN" \
            --wait --timeout 10m

      - name: Apply DatadogAgent CR
        run: |
          envsubst < datadog-agent.yaml | kubectl apply -f -

      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n "$DATADOG_NAMESPACE"
          echo ""
          echo "=== DatadogAgent CR ==="
          kubectl get datadogagent -n "$DATADOG_NAMESPACE" -o wide || true
          echo ""
          echo "=== Events (last 20) ==="
          kubectl get events -n "$DATADOG_NAMESPACE" --sort-by=.lastTimestamp | tail -20 || true
