name: Observability Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options: [staging, production]
        default: staging
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: string
        default: staging

jobs:
  datadog:
    name: Deploy Datadog (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EKS_CLUSTER_NAME: togglemaster-${{ inputs.environment }}-cluster
      DATADOG_NAMESPACE: datadog
      CHART_PATH: Observability/helm/datadog

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$EKS_CLUSTER_NAME"

      - name: Validate kubectl
        run: |
          kubectl version --client
          kubectl get nodes

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Add Datadog Helm repo
        run: |
          helm repo add datadog https://helm.datadoghq.com
          helm repo update

      - name: Build chart dependencies
        run: helm dependency update "$CHART_PATH"

      - name: Deploy Datadog Operator + Agent
        env:
          DD_API_KEY: ${{ secrets.API_KEY }}
          DD_APP_KEY: ${{ secrets.APP_KEY }}
        run: |
          helm upgrade --install datadog "$CHART_PATH" \
            --namespace "$DATADOG_NAMESPACE" \
            --create-namespace \
            --set clusterName="$EKS_CLUSTER_NAME" \
            --set credentials.apiKey="$DD_API_KEY" \
            --set credentials.appKey="$DD_APP_KEY" \
            --wait --timeout 10m

      - name: Wait for operator rollout
        run: |
          kubectl -n "$DATADOG_NAMESPACE" rollout status deploy/datadog-operator --timeout=5m

      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n "$DATADOG_NAMESPACE"
          echo "=== DatadogAgent CR ==="
          kubectl get datadogagent -n "$DATADOG_NAMESPACE" -o wide || true
          echo "=== Events (last 20) ==="
          kubectl get events -n "$DATADOG_NAMESPACE" --sort-by=.lastTimestamp | tail -20 || true
